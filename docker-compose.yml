services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - 5432:5432
    volumes:
      - pg_data:/var/lib/postgresql/data
    user: ${DB_UID}:${DB_GID}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ./docker
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      HOST: 0.0.0.0
      PORT: ${APP_PORT}
      APP_USERNAME: ${APP_USERNAME}
      APP_USERTITLE: ${APP_USERTITLE}
      APP_USEREMAIL: ${APP_USEREMAIL}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_OPS_ENABLED: ${DB_OPS_ENABLED}
      DB_OPS_SECRET: ${DB_OPS_SECRET}
      DB_BACKUP_DIR: /app/db-backup
      DB_BACKUP_RETENTION_DAYS: ${DB_BACKUP_RETENTION_DAYS}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    volumes:
      - pg_backup:/app/db-backup

volumes:
  pg_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DB_VOLUME}
  pg_backup:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${DB_BACKUP_VOLUME}
